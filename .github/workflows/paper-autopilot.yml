name: CryptoAI Paper Autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  paper-autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CRYPTOAI_LIVE_TRADING_ENABLED: "false"
      CRYPTOAI_PAPER_TRADING_ENABLED: "true"
      CRYPTOAI_REQUIRE_MANUAL_CONFIRMATION: "true"
      CRYPTOAI_MAX_LIVE_TRADE_USD: "0"
      CRYPTOAI_MAX_DAILY_LOSS_USD: "0"
      CRYPTOAI_AUTOPILOT_ENABLE_PAPER_EXECUTION: "true"
      CRYPTOAI_QUOTE_CACHE_SECONDS: "120"
      CRYPTOAI_STALE_QUOTE_SECONDS: "900"
      CRYPTOAI_PAPER_ALLOW_SIMULATED: "true"
      CRYPTOAI_MIN_EDGE_FOR_PAPER_PCT: "0.30"
      CRYPTOAI_MIN_AI_SCORE_FOR_PAPER: "50"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quote diagnostics
        run: |
          python -m app.diagnostics.quote_diagnostics

      - name: Run multi DEX opportunity engine
        run: |
          python -m app.opportunities.multi_dex_opportunity_engine

      - name: Run opportunity explorer
        run: |
          python -m app.opportunities.opportunity_explorer

      - name: Run one paper autopilot cycle
        run: |
          python -m app.automation.paper_autopilot --once

      - name: Generate paper report
        if: always()
        run: |
          python -m app.reporting.paper_report

      - name: Upload runtime data and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cryptoai-paper-report
          path: |
            data/
            reports/
          if-no-files-found: ignore
